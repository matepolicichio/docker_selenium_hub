services:
  selenium-hub:
    image: selenium/hub:latest
    container_name: selenium-hub
    ports:
      - "4444:4444"
      # SEGURIDAD: 4442-4443 (event bus) NO expuestos en el host.
      # Acceso interno únicamente. Exponer estos puertos permite registrar nodos maliciosos.
    environment:
      - SE_SESSION_ACCESS_KEY=${SELENIUM_SESSION_ACCESS_KEY}
      - SE_ROUTER_USERNAME=${SE_ROUTER_USERNAME}         # Auth básica para UI y API
      - SE_ROUTER_PASSWORD=${SE_ROUTER_PASSWORD}         # Auth básica para UI y API
      - SE_SESSION_REQUEST_TIMEOUT=300                   # Tiempo máximo de espera para slot (segundos)
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4444/wd/hub/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - selenium-grid

  chrome:
    image: selenium/node-chrome:latest
    container_name: chrome
    shm_size: 2g
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_SESSION_TIMEOUT=300                      # Mata sesiones ociosas tras 5 min
    depends_on:
      selenium-hub:
        condition: service_healthy                       # Espera a que el hub esté listo
      tor:
        condition: service_healthy                       # Espera a que Tor esté listo
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5555/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - selenium-grid

  chrome2:
    image: selenium/node-chrome:latest
    container_name: chrome2
    shm_size: 2g
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_SESSION_TIMEOUT=300
    depends_on:
      selenium-hub:
        condition: service_healthy
      tor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5555/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - selenium-grid

  chrome3:
    image: selenium/node-chrome:latest
    container_name: chrome3
    shm_size: 2g
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_SESSION_TIMEOUT=300
    depends_on:
      selenium-hub:
        condition: service_healthy
      tor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5555/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - selenium-grid


