  tor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tor
    # SEGURIDAD: puerto 9050 NO expuesto en el host.
    # Los nodos Chrome acceden al proxy por nombre de contenedor (tor:9050) dentro de la red Docker.
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9050"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - selenium-grid


