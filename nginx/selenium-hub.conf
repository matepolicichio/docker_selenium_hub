# =============================================================================
# selenium-hub.conf
# Destino en VPS: /etc/nginx/sites-available/selenium-hub.conf
#
# Prerequisitos:
#   - Certbot instalado y certificado generado para el dominio
#   - rate-limit.conf copiado a /etc/nginx/conf.d/
#   - Symlink activo: sites-available -> sites-enabled
#   - Docker stack corriendo con selenium-hub exponiendo 127.0.0.1:4444
#
# Activar con:
#   sudo ln -s /etc/nginx/sites-available/selenium-hub.conf \
#              /etc/nginx/sites-enabled/selenium-hub.conf
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    server_name selenium-hub.ingenios.com.ar;

    # Oculta la versión de nginx en headers y páginas de error
    server_tokens off;

    # -------------------------------------------------------------------------
    # Headers de seguridad HTTP
    # -------------------------------------------------------------------------
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------------------------------------------------------------------------
    # Logs
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/selenium-hub-access.log;
    error_log  /var/log/nginx/selenium-hub-error.log warn;

    # -------------------------------------------------------------------------
    # Creación de sesiones WebDriver — rate limiting estricto
    #
    # Cubre ambos formatos de endpoint:
    #   POST /session          → Grid 4 estándar W3C
    #   POST /wd/hub/session   → compatibilidad Grid 3 / clientes legacy
    #
    # Límite: 6 req/min con burst de 3. Rechaza con 429 si se supera.
    # -------------------------------------------------------------------------
    location ~ ^/(wd/hub/)?session$ {
        limit_req        zone=selenium_sessions burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:4444;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    300s;  # Tiempo máximo esperando respuesta del hub
        proxy_connect_timeout 10s;   # Tiempo máximo para establecer conexión
        proxy_send_timeout    300s;
    }

    # -------------------------------------------------------------------------
    # Grid UI, API REST y WebSocket — rate limiting general
    #
    # proxy_buffering off: necesario para el streaming en tiempo real del Grid UI.
    # WebSocket (Upgrade/Connection): necesario para la consola interactiva.
    # -------------------------------------------------------------------------
    location / {
        limit_req        zone=selenium_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:4444;
        proxy_http_version 1.1;

        # WebSocket support — requerido por la Grid UI en tiempo real
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Sin buffering para que el streaming del Grid UI no se interrumpa
        proxy_buffering off;

        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
    }

    # -------------------------------------------------------------------------
    # TLS — gestionado por Certbot / Let's Encrypt
    # No modificar manualmente estas líneas
    # -------------------------------------------------------------------------
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/selenium-hub.ingenios.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/selenium-hub.ingenios.com.ar/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

# -----------------------------------------------------------------------------
# Redirect HTTP → HTTPS (gestionado por Certbot)
# -----------------------------------------------------------------------------
server {
    if ($host = selenium-hub.ingenios.com.ar) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name selenium-hub.ingenios.com.ar;
    return 404;
}
