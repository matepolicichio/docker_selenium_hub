# =============================================================================
# rate-limit.conf
# Destino en VPS: /etc/nginx/conf.d/rate-limit.conf
#
# Define las zonas de rate limiting compartidas entre todos los virtual hosts.
# Este archivo debe estar dentro del bloque http {} de nginx, por lo que
# se ubica en conf.d/ (incluido automáticamente por nginx.conf).
# =============================================================================

# Zona general: 60 req/min por IP (burst de 20 para picos legítimos)
limit_req_zone $binary_remote_addr zone=selenium_general:10m rate=60r/m;

# Zona de sesiones: 6 req/min por IP (creación de sesiones WebDriver)
# Cada sesión nueva implica un browser completo — limitar es crítico
limit_req_zone $binary_remote_addr zone=selenium_sessions:10m rate=6r/m;
